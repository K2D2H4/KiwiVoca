# 키위보카 로컬 개발용 Compose
# 기동: docker compose up -d --build
# 접속: http://localhost:${HOST_PORT:-8080}
services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kiwivoca}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-kiwivoca_local_pw}
      - POSTGRES_DB=${POSTGRES_DB:-kiwivoca}
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kiwivoca}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg2://kiwivoca:kiwivoca_local_pw@db:5432/kiwivoca}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:8080/api/auth/google/callback}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID:-}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET:-}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI:-http://localhost:8080/api/auth/kakao/callback}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:8080}
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
    expose:
      - "8000"
    command:
      - sh
      - -c
      - python -m app.bootstrap && gunicorn app.main:app -w ${GUNICORN_WORKERS:-2} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --reload --timeout 120 --graceful-timeout 30 --access-logfile -

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-frontend
    restart: always
    environment:
      - VITE_API_BASE=${VITE_API_BASE:-/api}
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"
    depends_on:
      - backend
    stdin_open: true
    tty: true

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-nginx
    restart: always
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${HOST_PORT:-8080}:80"
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  uploads_data:
