# 키위보카 배포(VM)용 Compose
# 프론트는 빌드 산출물(정적 파일)을 nginx가 직접 서빙.
# 기동: docker compose -f docker-compose.prod.yml up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-kiwivoca}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-kiwivoca}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kiwivoca}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-14}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-3.5-flash}
      - GEMINI_TTS_MODEL=${GEMINI_TTS_MODEL:-gemini-2.5-flash-preview-tts}
      - GEMINI_TTS_VOICE=${GEMINI_TTS_VOICE:-Kore}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID:-}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET:-}
      - KAKAO_REDIRECT_URI=${KAKAO_REDIRECT_URI:-}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    volumes:
      - uploads_data:/app/uploads
      - tts_cache:/app/tts_cache
    expose:
      - "8000"
    command:
      - sh
      - -c
      - python -m app.bootstrap && gunicorn app.main:app -w ${GUNICORN_WORKERS:-3} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120 --graceful-timeout 30

  frontend-build:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE=${VITE_API_BASE:-/api}
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-frontend-build
    # 빌드 산출물(/app/dist)을 공유 volume(/export)으로 복사하고 종료 (nginx가 서빙)
    volumes:
      - frontend_dist:/export
    command: ["sh", "-c", "rm -rf /export/* && cp -r /app/dist/. /export/ && echo 'build copied'"]

  nginx:
    image: nginx:alpine
    container_name: ${COMPOSE_CONTAINER_PREFIX:-kiwivoca}-nginx
    restart: always
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend_dist:/usr/share/nginx/html:ro
    ports:
      - "${HOST_PORT:-80}:80"
    depends_on:
      - backend
      - frontend-build

volumes:
  pgdata:
  uploads_data:
  tts_cache:
  frontend_dist:
