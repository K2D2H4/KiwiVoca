name: Deploy to VM

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd ~/KiwiVoca
            git fetch --depth 1 origin main
            git reset --hard origin/main
            sudo docker compose -f docker-compose.prod.yml -f docker-compose.https.yml up -d --build
            sudo docker compose -f docker-compose.prod.yml -f docker-compose.https.yml restart nginx
            sudo docker image prune -f
            echo "deploy done: $(git rev-parse --short HEAD)"
