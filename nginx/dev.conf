# 키위보카 로컬 nginx — Vite dev 서버 + FastAPI 프록시
upstream backend {
    server backend:8000;
}
upstream frontend {
    server frontend:5173;
}

# WebSocket 업그레이드 매핑: Upgrade 헤더가 있으면 "upgrade", 없으면 ""(빈 값)
# → 일반 /api HTTP 요청은 영향 없이, /api/call/ws WS 만 업그레이드된다.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;   # 단어장 이미지 업로드 대응

    # 가상 전화 WebSocket → 백엔드 (Gemini Live 음성 프록시)
    location /api/call/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 통화 세션 유지 (오디오 무발화 구간 대응)
        proxy_send_timeout 3600s;
    }

    # API → 백엔드
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Vite HMR 웹소켓
    location /@vite/ {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # 그 외 전부 → Vite dev 서버 (HMR 웹소켓 포함)
    location / {
        proxy_pass http://frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
