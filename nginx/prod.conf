# 키위보카 배포 nginx — 정적 프론트 서빙 + FastAPI 프록시
upstream backend {
    server backend:8000;
    keepalive 32;
}

# WebSocket 업그레이드 매핑: Upgrade 헤더가 있으면 "upgrade", 없으면 ""(빈 값)
# → 일반 /api HTTP 요청은 영향 없이, /api/call/ws WS 만 업그레이드된다.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;

    # 보안 헤더
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 가상 전화 WebSocket → 백엔드 (Gemini Live 음성 프록시)
    location /api/call/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # 통화 세션 유지 (오디오 무발화 구간 대응)
        proxy_send_timeout 3600s;
    }

    # API → 백엔드
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # 정적 프론트 (SPA fallback)
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
